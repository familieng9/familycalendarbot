name: Daily Family Calendar Bot

on:
  schedule:
    - cron: '58 11 * * *'   # 19:58 SGT daily
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install playwright pyzipper pytz google-auth-oauthlib google-auth-httplib2 google-api-python-client

      - name: Install Playwright browsers
        run: playwright install chromium

      - name: Run bot
        env:
          SESSION_PASSWORD:   ${{ secrets.SESSION_PASSWORD }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          GOOGLE_TOKEN:       ${{ secrets.GOOGLE_TOKEN }}
          WHATSAPP_GROUP_CODE: ${{ secrets.WHATSAPP_GROUP_CODE }}
          CALENDAR_IDS:       ${{ secrets.CALENDAR_IDS }}
        run: python family_bot_cloud.py

      - name: Upload debug screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots
          path: debug_*.png
